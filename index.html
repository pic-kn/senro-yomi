<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ハヤよみ特急</title>
    <link rel="stylesheet" href="./styles.css?v=2.5" />
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="せんろ よみ">
        <header class="hud" aria-live="polite">
          <div>
            <span id="timeLabel" class="label">のこり</span>
            <strong id="time">120びょう</strong>
          </div>
          <div>
            <span class="label">すすみ</span>
            <strong id="progress">0/20</strong>
          </div>
          <div>
            <span class="label">いちばん</span>
            <strong id="best">--</strong>
          </div>
          <div>
            <span class="label">できた</span>
            <strong id="accuracy">100%</strong>
          </div>
        </header>

        <div class="stage-wrap" id="stageWrap">
          <canvas id="gameCanvas" aria-label="せんろ よみ"></canvas>
          <canvas id="confettiCanvas" class="confetti-canvas"></canvas>
          
          <div id="overlay" class="overlay">
            <h1 class="logo-text">ハヤよみ特急</h1>
            
            <div class="overlay-section">
              <h2 class="section-title">どこを はしる？</h2>
              <div id="routeButtonsOverlay" class="route-grid"></div>
            </div>

            <div class="overlay-section">
              <h2 class="section-title">どれくらい はやく はしる？</h2>
              <div class="difficulty-grid">
                <button class="diff-btn selected" data-value="120">
                  <span class="diff-rank">N</span>
                  <span class="diff-label">ふつう</span>
                </button>
                <button class="diff-btn" data-value="60">
                  <span class="diff-rank">H</span>
                  <span class="diff-label">むずかしい</span>
                </button>
                <button class="diff-btn" data-value="30">
                  <span class="diff-rank">O</span>
                  <span class="diff-label">おに</span>
                </button>
                <button class="diff-btn" data-value="endless">
                  <span class="diff-rank">∞</span>
                  <span class="diff-label">むせいげん</span>
                </button>
              </div>
            </div>

            <button id="startButton" class="start-action-btn">しゅっぱつ！</button>
            
            <p id="overlayCopy" class="overlay-copy"></p>
          </div>
          <div id="debugLog" class="debug-log"></div>
        </div>

        <footer class="controls">
          <div class="controls-main">
            <div class="status-indicator">
              <div id="statusFeedback" class="status-feedback">まいくをおしてね</div>
              <div id="statusTranscript" class="status-transcript">ひだりから よんでね</div>
            </div>
          </div>
        </footer>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
